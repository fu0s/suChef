<div class="min-h-screen flex items-center justify-center bg-stone-50">
  <div class="p-8 rounded-xl shadow-sm w-full max-w-md bg-white border border-stone-200">
    <h2 class="text-2xl font-bold mb-6 text-center text-stone-900">{{ 'auth.login.title' | translate }}</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-stone-500">{{ 'auth.login.email' | translate }}</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="mt-1 block w-full rounded-lg px-3 py-2 border border-stone-200 text-stone-900 focus:border-amber-600 focus:ring-0 outline-none transition-all"
          [placeholder]="'auth.login.emailPlaceholder' | translate"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-stone-500">{{ 'auth.login.password' | translate }}</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="mt-1 block w-full rounded-lg px-3 py-2 border border-stone-200 text-stone-900 focus:border-amber-600 focus:ring-0 outline-none transition-all"
          [placeholder]="'auth.login.passwordPlaceholder' | translate"
        />
      </div>

      <button
        type="submit"
        [disabled]="!loginForm.valid"
        class="w-full py-2 px-4 rounded-lg text-sm font-medium text-white transition-all bg-amber-600 hover:bg-amber-700 disabled:opacity-50"
      >
        {{ 'auth.login.submit' | translate }}
      </button>
    </form>

    <div class="mt-6">
      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-stone-200"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-stone-400">{{ 'auth.login.or' | translate }}</span>
        </div>
      </div>

      <button
        type="button"
        (click)="loginAsGuest()"
        class="w-full mt-4 py-2 px-4 rounded-lg text-sm font-medium transition-all border border-amber-600 text-amber-600 hover:bg-amber-50"
      >
        {{ 'auth.login.continueAsGuest' | translate }}
      </button>
    </div>

    <div class="mt-4 text-center">
      <p class="text-sm text-stone-500">
        {{ 'auth.login.noAccount' | translate }}
        <a routerLink="/register" class="font-semibold text-amber-700 hover:text-amber-800">{{ 'auth.login.registerLink' | translate }}</a>
      </p>
    </div>
  </div>
</div>
