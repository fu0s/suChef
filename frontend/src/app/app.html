<app-header></app-header>
<app-sidebar></app-sidebar>

@if (authService.isAuthenticated()) {
<main class="min-h-screen transition-all duration-300"
  [style.margin-left]="(sidebarService.isCollapsed$ | async) ? '80px' : '256px'"
  [style.width]="'calc(100% - ' + ((sidebarService.isCollapsed$ | async) ? '80px' : '256px') + ')'"
  style="background: #ffffff; color: var(--color-text-primary);">
  <div class="w-full px-4 sm:px-6 lg:px-8 py-12">
    <router-outlet></router-outlet>
  </div>
</main>
} @else {
<main class="w-full min-h-screen" style="background: #ffffff;">
  <router-outlet></router-outlet>
</main>
}
