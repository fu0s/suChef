# Production Profile — overrides for secure deployment
# F-3: CORS restricted to exact frontend domain (no localhost:*)
# F-1/F-2: Secrets MUST be set via environment variables (JWT_SECRET, DB_USERNAME, DB_PASSWORD)

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
jwt.secret=${JWT_SECRET}

# CORS: set via env var, comma-separated origins
# e.g. CORS_ALLOWED_ORIGINS=https://app.suchef.com,https://admin.suchef.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://app.suchef.com}

# MCP Production Settings (T-7.4)
spring.ai.mcp.server.request-timeout=${MCP_REQUEST_TIMEOUT:30s}
spring.ai.mcp.server.max-connections=${MCP_MAX_CONNECTIONS:50}

# Actuator: restrict to health only in production
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
