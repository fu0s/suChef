# Application Configuration
spring.application.name=SuChefService

# Server Configuration
server.port=8080

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.SuChefService=DEBUG

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5-coder:14b
spring.ai.ollama.chat.options.temperature=0

# Database Configuration
spring.datasource.init-url=jdbc:mysql://localhost:3306/?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://localhost:3306/suchef?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Liquibase Configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# JWT Configuration (F-1: externalized — set JWT_SECRET env var in production)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# Streaming and Debugging
server.compression.enabled=false
logging.level.org.springframework.web.servlet.mvc.method.annotation.SseEmitter=TRACE
logging.level.org.springframework.ai.chat.client.ChatClient=DEBUG
logging.level.org.springframework.ai.ollama=DEBUG
logging.level.org.springframework.http.codec.ServerSentEvent=TRACE

# Document Upload Configuration
app.upload.dir=uploads/documents

# OCR Configuration
app.ocr.confidence-threshold=0.5
app.ocr.max-pdf-pages=500
app.ocr.max-image-size=52428800
app.ocr.tesseract-data-path=/opt/homebrew/opt/tesseract/share/tessdata

# Spring Boot Actuator (T-7.4: health checks + observability)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true
