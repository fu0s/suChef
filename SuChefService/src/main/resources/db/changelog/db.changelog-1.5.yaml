databaseChangeLog:
  - changeSet:
      id: create-menu-item-ingredients-table
      author: team
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: menu_item_ingredients
      changes:
        - createTable:
            tableName: menu_item_ingredients
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: menu_item_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: inventory_item_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: DECIMAL(10,3)
                  constraints:
                    nullable: false
              - column:
                  name: unit
                  type: VARCHAR(20)
              - column:
                  name: notes
                  type: VARCHAR(255)
        - addForeignKeyConstraint:
            baseTableName: menu_item_ingredients
            baseColumnNames: menu_item_id
            constraintName: fk_menu_item_ingredients_menu_item
            referencedTableName: menu_items
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: menu_item_ingredients
            baseColumnNames: inventory_item_id
            constraintName: fk_menu_item_ingredients_inventory_item
            referencedTableName: inventory_items
            referencedColumnNames: id