databaseChangeLog:
  - changeSet:
      id: 3
      author: suchef-bot
      changes:
        - addColumn:
            tableName: documents
            columns:
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: 'RECEIVED'
                  constraints:
                    nullable: false
              - column:
                  name: classification
                  type: VARCHAR(50)
  - changeSet:
      id: 4
      author: suchef-bot
      changes:
        - createTable:
            tableName: restaurants
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: VARCHAR(255)
              - column:
                  name: opening_hours
                  type: VARCHAR(255)
              - column:
                  name: contact_info
                  type: VARCHAR(255)
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_restaurants_users
                    references: users(id)
  - changeSet:
      id: 5
      author: suchef-bot
      changes:
        - createTable:
            tableName: vendors
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: contact_info
                  type: VARCHAR(255)
              - column:
                  name: category
                  type: VARCHAR(100)
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_vendors_users
                    references: users(id)
  - changeSet:
      id: 6
      author: suchef-bot
      changes:
        - createTable:
            tableName: menu_items
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: price
                  type: DECIMAL(10, 2)
              - column:
                  name: category
                  type: VARCHAR(100)
              - column:
                  name: restaurant_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_menu_items_restaurants
                    references: restaurants(id)
  - changeSet:
      id: 7
      author: suchef-bot
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_date
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: total_amount
                  type: DECIMAL(10, 2)
              - column:
                  name: status
                  type: VARCHAR(50)
              - column:
                  name: restaurant_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_orders_restaurants
                    references: restaurants(id)
        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_items_orders
                    references: orders(id)
              - column:
                  name: menu_item_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_items_menu_items
                    references: menu_items(id)
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(10, 2)
  - changeSet:
      id: 8
      author: suchef-bot
      changes:
        - createTable:
            tableName: inventory_items
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: current_stock
                  type: DECIMAL(10, 2)
                  defaultValue: 0
                  constraints:
                    nullable: false
              - column:
                  name: unit
                  type: VARCHAR(20)
              - column:
                  name: unit_price
                  type: DECIMAL(10, 2)
              - column:
                  name: min_threshold
                  type: DECIMAL(10, 2)
              - column:
                  name: category
                  type: VARCHAR(100)
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_inventory_items_users
                    references: users(id)
  - changeSet:
      id: 9
      author: suchef-bot
      changes:
        - createTable:
            tableName: stock_transactions
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: item_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_stock_transactions_items
                    references: inventory_items(id)
              - column:
                  name: quantity_change
                  type: DECIMAL(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: document_id
                  type: VARCHAR(36)
                  constraints:
                    foreignKeyName: fk_stock_transactions_documents
                    references: documents(id)
              - column:
                  name: timestamp
                  type: DATETIME
                  constraints:
                    nullable: false
  - changeSet:
      id: 10
      author: suchef-bot
      changes:
        - createTable:
            tableName: restaurant_metrics
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_metrics_restaurants
                    references: restaurants(id)
              - column:
                  name: metric_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: metric_value
                  type: DECIMAL(15, 2)
              - column:
                  name: period_start
                  type: DATETIME
              - column:
                  name: period_end
                  type: DATETIME
