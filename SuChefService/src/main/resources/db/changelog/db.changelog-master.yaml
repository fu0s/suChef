databaseChangeLog:
  - changeSet:
      id: 1
      author: suchef-bot
      preConditions:
        - onFail: MARK_RAN
        - not:
          - tableExists:
              tableName: users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
  - changeSet:
      id: 2
      author: suchef-bot
      preConditions:
        - onFail: MARK_RAN
        - not:
          - tableExists:
              tableName: documents
      changes:
        - createTable:
            tableName: documents
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: date
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: uploaded_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_documents_users
                    references: users(id)
  - include:
      file: db/changelog/db.changelog-1.1.yaml
  - include:
      file: db/changelog/db.changelog-1.2.yaml
  - include:
      file: db/changelog/db.changelog-1.3.yaml
  - include:
      file: db/changelog/db.changelog-1.4.yaml
